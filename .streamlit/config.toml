[server]
headless = true
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = false

[theme]
base = "light"
primaryColor = "#C0573E"
backgroundColor = "#FBF7F0"
secondaryBackgroundColor = "#FFFDF9"
textColor = "#2A2420"
font = "sans serif"

